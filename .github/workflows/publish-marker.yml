name: Mark Topic Published

on:
  pull_request:
    types: [closed]
    paths:
      - 'src/content/posts/**'

permissions:
  issues: write

jobs:
  mark-published:
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true
    steps:
      - name: Find linked Issue from PR body
        id: find-issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # PR body may contain quotes / backticks / multi-line content, so write it
          # to a file via heredoc instead of inlining into a double-quoted shell
          # variable. Inline ${{ ... }} + embedded "## 草稿" in PR body previously
          # broke with exit 127 (early-close on unescaped ").
          cat > /tmp/pr_body.txt <<PR_BODY_EOF
${{ github.event.pull_request.body }}
PR_BODY_EOF
          ISSUE_NUM=$(grep -oE '(Issue|Refs)\s+#([0-9]+)' /tmp/pr_body.txt | head -1 | grep -oE '[0-9]+')
          if [ -z "$ISSUE_NUM" ]; then
            echo "No linked issue found in PR body"
            exit 0
          fi
          echo "issue_num=$ISSUE_NUM" >> $GITHUB_OUTPUT

      - name: Update label and close
        if: steps.find-issue.outputs.issue_num != ''
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM=${{ steps.find-issue.outputs.issue_num }}
          API="https://api.github.com/repos/$GITHUB_REPOSITORY"
          AUTH="Authorization: Bearer $GITHUB_TOKEN"
          # Remove labels, add new one
          curl -sS -X DELETE -H "$AUTH" "$API/issues/$ISSUE_NUM/labels/topic-drafting" || true
          curl -sS -X DELETE -H "$AUTH" "$API/issues/$ISSUE_NUM/labels/topic-pending" || true
          curl -sS -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" "$API/issues/$ISSUE_NUM/labels" -d '{"labels":["topic-published"]}' || true
          # Close issue
          curl -sS -X PATCH -H "$AUTH" -H "Content-Type: application/json" "$API/issues/$ISSUE_NUM" -d '{"state":"closed","state_reason":"completed"}'
