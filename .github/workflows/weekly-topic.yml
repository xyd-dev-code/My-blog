name: Weekly Topic Picker

on:
  # schedule:
  #   # UTC 周一/周四 01:00 = 北京时间 09:00
  #   - cron: '0 1 * * 1'
  #   - cron: '0 1 * * 4'
  workflow_dispatch: # 允许手动触发测试

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  pick-and-skeleton:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find + parse + skeleton + email (single shell step)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: |
          set -euo pipefail

          # 1. Find earliest pending topic
          PENDING=$(node .github/scripts/find-pending-issue.mjs)
          if [ "$PENDING" = "{}" ]; then
            echo "No pending topics, skipped."
            exit 0
          fi

          # 2. Extract fields from PENDING via node
          ISSUE_NUMBER=$(node -e "console.log(JSON.parse(process.argv[1]).number)" "$PENDING")
          ISSUE_URL=$(node -e "console.log(JSON.parse(process.argv[1]).url)" "$PENDING")
          ISSUE_BODY=$(node -e "console.log(JSON.parse(process.argv[1]).body)" "$PENDING")

          # 3. Parse Issue body
          PARSED=$(echo "$ISSUE_BODY" | node .github/scripts/parse-issue.mjs)
          if [ -z "$PARSED" ]; then
            echo "::error::parse-issue returned empty for issue #$ISSUE_NUMBER"
            exit 1
          fi
          ERROR=$(node -e "console.log(JSON.parse(process.argv[1]).error || '')" "$PARSED")
          if [ -n "$ERROR" ] && [ "$ERROR" != "null" ]; then
            echo "::error::parse-issue error: $ERROR"
            gh issue comment "$ISSUE_NUMBER" --body "⚠️ weekly-topic workflow failed to parse this issue: \`$ERROR\`" --repo "$GITHUB_REPOSITORY" || true
            exit 1
          fi

          # 4. Extract fields from PARSED
          SLUG=$(node -e "console.log(JSON.parse(process.argv[1]).slug)" "$PARSED")
          TITLE=$(node -e "console.log(JSON.parse(process.argv[1]).title)" "$PARSED")
          CATEGORY=$(node -e "console.log(JSON.parse(process.argv[1]).category)" "$PARSED")
          TAGS_JSON=$(node -e "console.log(JSON.stringify(JSON.parse(process.argv[1]).tags))" "$PARSED")
          POINTS_BODY=$(node -e "console.log(JSON.parse(process.argv[1]).body_after_frontmatter)" "$PARSED")

          # 5. Generate skeleton + open PR
          export SLUG TITLE CATEGORY TAGS_JSON POINTS_BODY ISSUE_NUMBER ISSUE_URL
          node .github/scripts/generate-skeleton.mjs

          # 6. Send reminder email
          export SUBJECT="[博客选题] $TITLE"
          BODY="本周选题:#$ISSUE_NUMBER

          主题:$TITLE
          分类:$CATEGORY

          Issue:$ISSUE_URL

          骨架 PR 已创建,请在本地跑 /blog-draft $ISSUE_NUMBER 生成草稿。"
          export BODY
          node .github/scripts/send-email.mjs

          # 7. Update Issue label
          API="https://api.github.com/repos/$GITHUB_REPOSITORY"
          AUTH="Authorization: Bearer $GITHUB_TOKEN"
          curl -sS -X DELETE -H "$AUTH" "$API/issues/$ISSUE_NUMBER/labels/topic-pending" || true
          curl -sS -X POST -H "$AUTH" -H "Accept: application/vnd.github+json" "$API/issues/$ISSUE_NUMBER/labels" -d '{"labels":["topic-drafting"]}' || true

          echo "Done. Issue #$ISSUE_NUMBER (slug=$SLUG) is now drafting."