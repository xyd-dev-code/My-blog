backend:
  name: github
  repo: xyd-dev-code/My-blog
  branch: main
  base_url: https://identity.netlify.com
  auth_endpoint: auth
  open_authoring: false
  commit_messages:
    create: "feat(posts): 新增 {{slug}}"
    update: "chore(posts): 更新 {{slug}}"
    delete: "chore(posts): 删除 {{slug}}"
    uploadMedia: "chore(media): 上传 {{path}}"
    deleteMedia: "chore(media): 删除 {{path}}"
    openAuthoring: "docs: {{message}}"

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

collections:
  - name: "posts"
    label: "文章"
    folder: "src/content/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    extension: "mdx"
    format: "frontmatter"
    fields:
      - { label: "URL Slug", name: "slug", widget: "string", hint: "文件名后缀，只用英文/数字/横杠（例: my-first-post）" }
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "发布日期", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "更新日期", name: "updatedDate", widget: "datetime", required: false, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "标签", name: "tags", widget: "list", default: [] }
      - { label: "封面图", name: "cover", widget: "image", required: false, allow_multiple: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false, required: false }
      - { label: "正文", name: "body", widget: "markdown" }

  - name: "friends"
    label: "友情链接"
    description: "/friends 页面卡片数据。新申请由 GitHub Issue 收集,通过本面板合并。"
    files:
      - name: "friends"
        label: "Friends 列表"
        file: "src/data/friends.json"
        format: "json"
        create: false
        delete: false
        fields:
          - { label: "站点名称", name: "name", widget: "string" }
          - { label: "站点地址", name: "url", widget: "string" }
          - { label: "头像链接", name: "avatar", widget: "string" }
          - { label: "一句话简介", name: "desc", widget: "text" }
          - { label: "分组", name: "group", widget: "select", options: ["self", "friend"], required: false, default: "friend" }
          - { label: "状态", name: "status", widget: "select", options: ["approved", "pending"], required: false, hint: "pending 仅作审计元数据,不影响渲染" }