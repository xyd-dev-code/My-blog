<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Content Manager</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://unpkg.com/decap-cms@3.6.4/dist/decap-cms.css" />
  </head>
  <body>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
    <script src="https://unpkg.com/decap-cms@3.6.4/dist/decap-cms.js"></script>
    <script>
      // 仓库部署在 GitHub Pages 项目页，base 路径硬编码为 /My-blog
      // 本地 dev 时 base 为 /，访问 /admin/ 不会登录（OAuth 回调不在白名单）
      window.CMS.init({
        configUrl: '/My-blog/admin/config.yml',
      });
    </script>
  </body>
</html>
