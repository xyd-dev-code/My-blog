<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#fcd34d"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </radialGradient>
  </defs>
  <!-- 圆角天空背景 -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#sky)"/>
  <!-- 太阳 -->
  <circle cx="42" cy="22" r="9" fill="url(#sun)"/>
  <!-- 云朵 -->
  <g fill="#ffffff" opacity="0.95">
    <ellipse cx="20" cy="32" rx="11" ry="7"/>
    <ellipse cx="28" cy="28" rx="13" ry="9"/>
    <ellipse cx="36" cy="32" rx="10" ry="6"/>
  </g>
  <!-- 远山 -->
  <path
    d="M2,46 Q16,38 30,42 T58,44 L58,62 L2,62 Z"
    fill="#bae6fd"
  />
  <!-- 近山 -->
  <path
    d="M2,52 Q20,46 38,50 T62,50 L62,62 L2,62 Z"
    fill="#38bdf8"
    opacity="0.85"
  />
</svg>
